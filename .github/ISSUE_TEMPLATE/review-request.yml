name: Request Site Review
description: Request that a website be reviewed or re-reviewed for dark mode and colour contrast accessibility.
labels:
  - review-request
body:
  - type: markdown
    attributes:
      value: |
        Thanks for submitting a review request! Our scanner will check the site's **dark mode support** and **colour contrast accessibility** and post the results here. Please allow a few minutes for the scan to complete.

  - type: input
    id: website-url
    attributes:
      label: Website URL
      description: The full URL of the website to review (must be publicly accessible).
      placeholder: "https://example.com"
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: This website is publicly accessible (no login required)
          required: true
        - label: I understand the same site can only be re-reviewed once every 7 days
          required: true
